<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Catppuccin Mocha terminal background, rounded corners -->
  <rect width="16" height="16" rx="2.5" ry="2.5" fill="#1e1e2e"/>

  <!-- Mirrors the on-page header: blue "$" prompt + muted command text.
       "$" in cols 2..6 (5 wide) rows 2..9 (8 tall), drawn pixel-perfect.
       "_" in cols 9..13 row 12. -->

  <!-- "$" : Catppuccin blue, same as CSS var accent-color / .prompt-symbol -->
  <g fill="#89b4fa">
    <!-- full-height vertical bar through the S (col 4, rows 2..9) -->
    <rect x="4" y="2" width="1" height="8"/>
    <!-- top arc of the S -->
    <rect x="3" y="3" width="3" height="1"/>
    <rect x="2" y="4" width="1" height="1"/>
    <rect x="3" y="5" width="2" height="1"/>
    <!-- bottom arc of the S -->
    <rect x="4" y="6" width="2" height="1"/>
    <rect x="6" y="7" width="1" height="1"/>
    <rect x="3" y="8" width="3" height="1"/>
  </g>

  <!-- "_" : Catppuccin subtext1, same as CSS var fontcolor-muted / .prompt-command -->
  <rect x="9" y="12" width="5" height="1" fill="#bac2de"/>
</svg>
